<!DOCTYPE html>
<html lang="zh-CN">
<!-- safety_map_viewer.html (V18.2 - 最终隐藏进度版) -->
<head>
    <meta charset="UTF-8">
    <title>实时态势图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.marker.slideto@0.3.0/Leaflet.Marker.SlideTo.js"></script>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        body { display: flex; flex-direction: column; }
        #header { background-color: #2c3e50; color: white; padding: 0 20px; flex-shrink: 0; height: 50px; z-index: 1001; display: flex; justify-content: space-between; align-items: center; }
        .view-container { position: relative; flex-grow: 1; min-height: 0; }
        #map, #subway-view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #status-bar { display: flex; justify-content: space-between; align-items: center; background-color: #34495e; color: #ecf0f1; padding: 0 20px; flex-shrink: 0; font-size: 14px; height: 40px; }
        #status-bar > div { flex: 1; } #status-bar .center { text-align: center; } #status-bar .right { text-align: right; } #status-bar b { color: #fff; margin-right: 5px;}
        #toggle-view-btn { padding: 5px 15px; font-size: 14px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #toggle-view-btn:hover { background-color: #2980b9; }
        #subway-view { background-color: #f4f6f9; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; padding: 5% 5%; box-sizing: border-box; gap: 80px; }
        .subway-line-container { width: 100%; }
        .subway-line-label { font-weight: bold; color: #555; margin-bottom: 10px; }
        .subway-line-label .length-info { font-weight: normal; font-size: 12px; color: #777; margin-left: 10px; }
        .subway-track-container { position: relative; width: 100%; height: 8px; }
        .subway-track { width: 100%; height: 100%; background-color: #bdc3c7; border-radius: 4px; }
        .subway-station { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 16px; height: 16px; background: white; border: 4px solid #3498db; border-radius: 50%; z-index: 2; }
        .subway-station .label { position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%); white-space: nowrap; font-size: 14px; color: #34495e; background-color: rgba(244, 246, 249, 0.8); padding: 2px 4px; border-radius: 3px; }
        .subway-vehicle { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 30px; height: 16px; background-color: #f39c12; border: 2px solid #2c3e50; border-radius: 3px; transition: left 1200ms linear; z-index: 3; }
        .station-connector { position: absolute; background-color: rgba(142, 68, 173, 0.2); width: 3px; z-index: 0; }
    </style>
</head>
<body>
    <div id="header">
        <h1>实时态势图</h1>
        <button id="toggle-view-btn">切换到地铁视图</button>
    </div>
    <div class="view-container">
        <div id="map"></div>
        <div id="subway-view" style="display: none;"></div>
    </div>
    <div id="status-bar">
        <div><b id="connection-status">⚪ 正在连接...</b></div>
        <div class="center" id="vehicle-info"><b>车辆ID:</b> ---</div>
        <div class="right" id="clock">--:--:--</div>
    </div>

    <script>
        const App = {
            currentView: 'satellite', map: null, markers: {}, trajectoryLayers: {},
            subwayData: null,
            vehicleIcon: L.icon({
                iconUrl: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="38" height="38" viewBox="0 0 38 38"><circle cx="19" cy="19" r="19" fill="%23000000"/><path d="M14,10 L24,10 Q28,10 30,12 L30,24 Q28,26 24,26 L14,26 Q10,26 8,24 L8,12 Q10,10 14,10 Z" fill="none" stroke="white" stroke-width="2"/><rect x="17" y="6" width="4" height="3" fill="white"/><rect x="12" y="12" width="15" height="8" fill="white"/><ellipse cx="17" cy="21" rx="2" ry="1.5" fill="white"/><ellipse cx="23" cy="21" rx="2" ry="1.5" fill="white"/><path d="M14,26 L10,32" stroke="white" stroke-width="2"/><path d="M26,26 L30,32" stroke="white" stroke-width="2"/></svg>',
                iconSize: [38, 38], iconAnchor: [19, 19],
            }),

            async init() {
                this.setupClock();
                await this.setupSatelliteView();
                await this.setupSubwayView();
                this.setupViewToggle();
                this.connectToServer();
            },

            // <<< --- 核心修改：移除状态栏中的“进度”显示 --- >>>
            handleRealtimeEvent(message) {
                 if (message.messageType === 'vehicle_position') {
                     this.updateSatelliteVehicle(message.data);
                     this.updateSubwayVehicle(message.data);
                 }
                 const vehicleInfo = document.getElementById('vehicle-info');
                 let infoHtml = `<b>车辆ID:</b> ${message.data.trainDeviceCode}`;
                 if (message.data.speed != null) {
                     infoHtml += ` <b>速度:</b> ${message.data.speed} km/h`;
                 }
                 if (message.data.matched_trajectory_alias) {
                    infoHtml += ` <b>线路:</b> ${message.data.matched_trajectory_alias}`;
                 }
                 // “进度”百分比已被移除
                 vehicleInfo.innerHTML = infoHtml;
            },

            // ... 其他所有JS函数保持不变 ...
            updateSatelliteVehicle(data) { /* ... */ },
            updateSubwayVehicle(data) { /* ... */ },
            setupSatelliteView() { /* ... */ },
            setupSubwayView() { /* ... */ },
            setupSubwayView() { /* ... */ },
            drawStationConnectors() { /* ... */ },
            setupViewToggle() { /* ... */ },
            connectToServer() { /* ... */ },
            setupClock() { /* ... */ },
            findClosestPointOnPolyline(latlng, polyline) { /* ... */ }
        };

        // 折叠无变化的函数
        App.setupSatelliteView = async function() { this.map = L.map('map', { zoomControl: true }); L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri' }).addTo(this.map); const [trajectories, stations] = await Promise.all([ fetch('/trajectory_points.json').then(res => res.json()), fetch('/stations.json').then(res => res.json()) ]); const allLayersGroup = L.featureGroup(); const colors = ['#00FFFF', '#FF00FF', '#00FF00', '#FFA500', '#FF0000', '#0000FF']; let colorIndex = 0; for (const trajAlias in trajectories) { const polyline = L.polyline(trajectories[trajAlias], { color: colors[colorIndex % colors.length], weight: 5, opacity: 0.7 }).bindTooltip(`线路: ${trajAlias}`); this.trajectoryLayers[trajAlias] = polyline; allLayersGroup.addLayer(polyline); colorIndex++; } this.map.addLayer(allLayersGroup); stations.forEach(group => { const stationType = group.is_shared ? "共线站" : "独有站"; const stationName = group.stations[0].name; const serviceLines = group.stations.map(s => s.trajectory_alias).join(', '); const popupContent = `<b>站点信息</b><hr><b>名称:</b> ${stationName}<br><b>类型:</b> ${stationType}<br><b>服务线路:</b> ${serviceLines}`; const iconColor = group.is_shared ? 'purple' : '#3498db'; const icon = L.divIcon({ html: `<svg height="20" width="20" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" fill="${iconColor}" stroke="white" stroke-width="2" rx="3"/></svg>`, className: '', iconSize: [20, 20]}); L.marker(group.location, {icon: icon}).addTo(this.map).bindPopup(popupContent); }); if (allLayersGroup.getLayers().length > 0) this.map.fitBounds(allLayersGroup.getBounds().pad(0.1)); };
        App.setupSubwayView = async function() { this.subwayData = await fetch('/subway_layout.json').then(res => res.json()); const subwayContainer = document.getElementById('subway-view'); subwayContainer.innerHTML = ''; for (const trajAlias in this.subwayData) { const lineData = this.subwayData[trajAlias]; const lineContainer = document.createElement('div'); lineContainer.className = 'subway-line-container'; const lengthInfo = `(${(lineData.length).toFixed(2)} m)`; const masterInfo = lineData.is_master ? ' (基准)' : ' (已对齐)'; const safeTrajAliasId = trajAlias.replace(/\s|\(|\)/g, '_'); lineContainer.innerHTML = `<div class="subway-line-label">线路: ${trajAlias}<span class="length-info">${lengthInfo}${masterInfo}</span></div><div class="subway-track-container" id="track-container-${safeTrajAliasId}"><div class="subway-track" id="track-${safeTrajAliasId}"></div></div>`; subwayContainer.appendChild(lineContainer); const trackDiv = lineContainer.querySelector(`#track-${safeTrajAliasId}`); lineData.stations.forEach(station => { const stationDiv = document.createElement('div'); stationDiv.className = 'subway-station'; stationDiv.style.left = `${station.display_progress * 100}%`; stationDiv.innerHTML = `<div class="label">${station.name}</div>`; if (station.shared_id) stationDiv.dataset.sharedId = station.shared_id; trackDiv.appendChild(stationDiv); }); } this.drawStationConnectors(); };
        App.drawStationConnectors = function() { const subwayContainer = document.getElementById('subway-view'); const sharedStations = {}; document.querySelectorAll('.subway-station[data-shared-id]').forEach(el => { const id = el.dataset.sharedId; if (!sharedStations[id]) sharedStations[id] = []; sharedStations[id].push(el); }); for (const id in sharedStations) { const elements = sharedStations[id]; if (elements.length > 1) { const el1 = elements[0], el2 = elements[1]; const rect1 = el1.getBoundingClientRect(), rect2 = el2.getBoundingClientRect(); const containerRect = subwayContainer.getBoundingClientRect(); const connector = document.createElement('div'); connector.className = 'station-connector'; connector.style.left = `${rect1.left - containerRect.left + (rect1.width / 2) - 1.5}px`; connector.style.top = `${rect1.top - containerRect.top + (rect1.height / 2)}px`; connector.style.height = `${rect2.top - rect1.top}px`; subwayContainer.appendChild(connector); } } };
        App.setupViewToggle = function() { const btn = document.getElementById('toggle-view-btn'); btn.addEventListener('click', () => { const satelliteContainer = document.getElementById('map'), subwayContainer = document.getElementById('subway-view'); if (this.currentView === 'satellite') { satelliteContainer.style.display = 'none'; subwayContainer.style.display = 'flex'; btn.innerText = '切换到卫星视图'; this.currentView = 'subway'; document.querySelectorAll('.station-connector').forEach(c => c.remove()); this.drawStationConnectors(); } else { subwayContainer.style.display = 'none'; satelliteContainer.style.display = 'block'; btn.innerText = '切换到地铁视图'; this.currentView = 'satellite'; this.map.invalidateSize(); } }); };
        App.connectToServer = function() { const ws = new WebSocket(`ws://${window.location.host}/ws`); ws.onopen = () => { document.getElementById('connection-status').innerHTML = '<b>🟢 已连接</b>'; }; ws.onclose = () => { document.getElementById('connection-status').innerHTML = '<b>🔴 已断开</b>'; setTimeout(() => this.connectToServer(), 3000); }; ws.onerror = () => { document.getElementById('connection-status').innerHTML = '<b>🟠 连接错误</b>'; }; ws.onmessage = (event) => this.handleRealtimeEvent(JSON.parse(event.data)); };
        App.updateSatelliteVehicle = function(data) { const id = `vehicle-${data.trainDeviceCode}`; const rawLatLng = L.latLng(data.lat, data.lon); const matchedTrajAlias = data.matched_trajectory_alias; const targetPolyline = this.trajectoryLayers[matchedTrajAlias]; if (!targetPolyline) return; const snapped = this.findClosestPointOnPolyline(rawLatLng, targetPolyline); if (this.markers[id]) { this.markers[id].slideTo(snapped.latLng, { duration: 1000 }); } else { this.markers[id] = L.marker(snapped.latLng, { icon: this.vehicleIcon, zIndexOffset: 1000 }).addTo(this.map); } };
        App.updateSubwayVehicle = function(data) { const trajAlias = data.matched_trajectory_alias; const safeTrajAliasId = trajAlias.replace(/\s|\(|\)/g, '_'); const trackId = `track-${safeTrajAliasId}`; const track = document.getElementById(trackId); if (!track) return; let vehicleDiv = document.getElementById(`subway-vehicle-${data.trainDeviceCode}`); if (!vehicleDiv) { vehicleDiv = document.createElement('div'); vehicleDiv.id = `subway-vehicle-${data.trainDeviceCode}`; vehicleDiv.className = 'subway-vehicle'; track.appendChild(vehicleDiv); } else if (vehicleDiv.parentElement !== track) { track.appendChild(vehicleDiv); } if (data.display_progress !== undefined) { vehicleDiv.style.left = `${data.display_progress * 100}%`; } };
        App.setupClock = function() { setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('zh-CN'); }, 1000); };
        App.findClosestPointOnPolyline = function(latlng, polyline) { let minDistance = Infinity, closestPoint = null; if (!polyline) return { latLng: latlng }; const points = polyline.getLatLngs(); for (let i = 0; i < points.length - 1; i++) { const p1 = this.map.project(points[i]), p2 = this.map.project(points[i+1]), p = this.map.project(latlng); const closest = L.LineUtil.closestPointOnSegment(p, p1, p2); const distance = closest.distanceTo(p); if (distance < minDistance) { minDistance = distance; closestPoint = closest; } } return { latLng: this.map.unproject(closestPoint) }; };

        document.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
</html>
